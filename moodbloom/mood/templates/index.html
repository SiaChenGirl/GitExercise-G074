<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(to bottom, #e6dcff, #6a4fbf); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    .container { width: 90%; max-width: 1200px; transform: translateY(-10%); }
    .top-bar { display: flex; align-items: center; justify-content: space-between; }
    .logo, .title, .menu { width: 20%; }
    .logo img, .title img { width: 100%; }
    .menu-btn { font-size: 30px; cursor: pointer; color: white; text-align: right; }
    .content { display: flex; justify-content: center; align-items: center; gap: 60px; margin-top: 20px; }
    .quote-box { width: 300px; height: 350px; background: white; border-radius: 25px; padding: 25px; font-family: 'Dancing Script', cursive; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .quote-title { font-size: 28px; margin-bottom: 15px; color: #6a4fbf; text-align: center;}
    #quote { text-align: center; font-size: 20px; line-height: 1.6; color: #6a4fbf; }
    .right-side { display: flex; flex-direction: column; align-items: center; }
    .slogan { font-family: 'Dancing Script', cursive; font-size: 34px; color: white; margin-bottom: 15px; text-shadow: 2px 2px 0px #b39ddb, 4px 4px 10px rgba(0,0,0,0.4); }
    .login-box { width: 380px; background: white; border-radius: 25px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin-top: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button { margin-top: 18px; width: 100%; padding: 12px; border-radius: 12px; border: none; background: #b39ddb; cursor: pointer; font-weight: bold; color: white;}
    .links { text-align: center; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="logo"><img src="logo.png"></div>
        <div class="title"><img src="title.png"></div>
        <div class="menu"><div class="menu-btn">☰</div></div>
    </div>
    <div class="content">
        <div class="quote-box">
            <div class="quote-title">Quotes</div>
            <p id="quote"></p>
        </div>
        <div class="right-side">
            <div class="slogan">mood your day, bloom ur mind</div>
            <div class="login-box">
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button onclick="handleLogin()">Log in</button>
                <div class="links">
                    <a href="/register/" style="text-decoration:none; color:gray;">Register</a><br>
                    Forgot password
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const quotes = [
        "Today feels gentle 🌙",
        "You are growing slowly 🌱",
        "Some days feel heavy 🌧️",
        "Breathe in softly 🌿"
    ];
    let i = 0;
    function showQuote() {
        document.getElementById("quote").innerText = quotes[i];
        i = (i + 1) % quotes.length;
    }
    showQuote();
    setInterval(showQuote, 10000);

    async function handleLogin() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        try {
            const response = await fetch('/', { // 这里对应 urls.py 的登录路径
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (data.message) {
                alert("Login Successful!");
                window.location.href = '/dashboard/'; // 登录后跳转
            } else {
                alert("Error: " + data.error);
            }
        } catch (error) {
            alert("Login Failed!");
        }
    }
</script>
</body>
</html>
