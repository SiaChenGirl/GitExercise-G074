<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MoodBloom | Profile</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #fdfbfb 0%, #e8e0ff 100%); min-height: 130vh; }
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; }
        .header-line { border: 0; height: 1px; background: #c5b3e6; margin: 0 40px 30px 40px; }
        .logo img { width: 110px; } .title-img img { width: 230px; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .field { margin-bottom: 20px; }
        label { display: block; color: #6a4fbf; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; box-sizing: border-box; background: #fafafa; transition: 0.3s; }
        input:focus { border-color: #b39ddb; outline: none; background: white; }
        
        .btn { width: 100%; padding: 14px; background: #b39ddb; border: none; border-radius: 12px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #9a81c7; }
        .btn-del { background: none; border: 1px solid #ffb3b3; color: #ff6666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <div class="logo"><img src="logo.png"></div>
        <div class="title-img"><img src="title.png"></div>
        <div class="menu"><button onclick="location.href='mainpage.html'" style="background:none; border:none; color:#6a4fbf; cursor:pointer; font-weight:bold;">Back</button></div>
    </div>
    <hr class="header-line">

    <div class="container">
        <div style="width:120px; height:120px; background:#f0f0f0; border-radius:50%; margin: 0 auto 20px; border: 2px solid #e8e0ff; display: flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
        
        <div class="field">
            <label>Username</label>
            <input type="text" id="p-user" placeholder="Enter username">
        </div>
        <div class="field">
            <label>Birthday</label>
            <input type="text" id="p-birth" placeholder="DD / MM / YYYY">
        </div>
        <div class="field">
            <label>Gender</label>
            <input type="text" id="p-gender" placeholder="e.g. Female">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="p-email" placeholder="example@mail.com">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="p-pass" value="********">
        </div>

        <button class="btn" onclick="saveProfile()">Save Changes</button>
        <button class="btn btn-del" onclick="deleteAccount()">Delete Account</button>
    </div>

    <script>
        // 1. Load data from LocalStorage when the page opens
        window.onload = function() {
            if(localStorage.getItem('userProfile')) {
                const data = JSON.parse(localStorage.getItem('userProfile'));
                document.getElementById('p-user').value = data.username;
                document.getElementById('p-birth').value = data.birthday;
                document.getElementById('p-gender').value = data.gender;
                document.getElementById('p-email').value = data.email;
            } else {
                // Default values if first time
                document.getElementById('p-user').value = "Hibb";
                document.getElementById('p-birth').value = "22 / 04 / 2006";
                document.getElementById('p-gender').value = "Female";
                document.getElementById('p-email').value = "hibb@moodbloom.com";
            }
        };

        // 2. Save data to LocalStorage
        function saveProfile() {
            const profileData = {
                username: document.getElementById('p-user').value,
                birthday: document.getElementById('p-birth').value,
                gender: document.getElementById('p-gender').value,
                email: document.getElementById('p-email').value
            };
            localStorage.setItem('userProfile', JSON.stringify(profileData));
            alert("Profile updated successfully! 💜");
        }

        function deleteAccount() {
            if(confirm("Are you sure? This will clear all your data.")) {
                localStorage.clear();
                location.href = 'register.html';
            }
        }
    </script>
</body>
</html>
