<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mood Entry</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #e6dcff, #6a4fbf);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 500px;
    background: white;
    border-radius: 25px;
    padding: 25px;
    text-align: center;
}

.title {
    font-family: 'Dancing Script', cursive;
    font-size: 30px;
    margin-bottom: 15px;
}

.moods {
    font-size: 30px;
    margin: 10px 0;
    cursor: pointer;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    padding: 10px;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #b39ddb;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">How are you feeling today? 💜</div>

    <div class="moods">
        😊 😢 😡 😴 😍
    </div>

    <textarea placeholder="Write your thoughts..."></textarea>

    <button onclick="location.href='main.html'">Save</button>

</div>

</body>
</html>
