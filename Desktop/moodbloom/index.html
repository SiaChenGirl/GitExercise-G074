<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodBloom</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #e6dcff, #6a4fbf);

    height: 100vh;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CONTAINER (moved up 10%) */
.container {
    width: 90%;
    max-width: 1200px;

    transform: translateY(-10%);
}

/* TOP BAR */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* LOGO */
.logo {
    width: 20%;
}

.logo img {
    width: 100%;
}

/* TITLE */
.title {
    width: 30%;
    text-align: center;
}

.title img {
    width: 100%;
}

/* MENU */
.menu {
    width: 10%;
    text-align: right;
}

.menu-btn {
    font-size: 30px;
    cursor: pointer;
    color: white;
}

.dropdown {
    display: none;
    position: absolute;
    right: 40px;
    top: 80px;
    background: white;
    border-radius: 10px;
    padding: 10px;
}

.dropdown div {
    padding: 10px;
    cursor: pointer;
}

.dropdown div:hover {
    background: #eee;
}

/* CONTENT */
.content {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;

    margin-top: 20px;
}

/* QUOTE BOX */
.quote-box {
    width: 300px;
    height: 400px;
    background: white;
    border-radius: 25px;
    padding: 25px;

    display: flex;
    flex-direction: column;
    align-items: center;

    font-family: 'Dancing Script', cursive;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.quote-title {
    font-size: 28px;
    margin-bottom: 15px;
    color: #6a4fbf;
}

#quote {
    text-align: center;
    font-size: 20px;
    line-height: 1.8;
    color: #6a4fbf;
}

/* RIGHT SIDE */
.right-side {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* SLOGAN */
.slogan {
    font-family: 'Dancing Script', cursive;
    font-size: 34px;
    color: white;
    margin-bottom: 15px;

    text-shadow:
        2px 2px 0px #b39ddb,
        4px 4px 10px rgba(0,0,0,0.4);
}

/* LOGIN BOX */
.login-box {
    width: 380px;
    background: white;
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #b39ddb;
    cursor: pointer;
    font-weight: bold;
}

.links {
    text-align: center;
    font-size: 12px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

    <div class="top-bar">

        <div class="logo">
            <img src="logo.png">
        </div>

        <div class="title">
            <img src="title.png">
        </div>

        <div class="menu">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <div class="dropdown" id="menu">
                <div>Profile</div>
                <div>Feedback</div>
                <div>Logout</div>
            </div>
        </div>

    </div>

    <div class="content">

        <div class="quote-box">
            <div class="quote-title">Quotes</div>
            <p id="quote"></p>
        </div>

        <div class="right-side">

            <div class="slogan">
                mood your day, bloom ur mind
            </div>

            <div class="login-box">
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <button>Log in</button>

                <div class="links">
                    Register<br>
                    Forgot password
                </div>
            </div>

        </div>

    </div>

</div>

<script>
function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

const quotes = [
`Today feels gentle 🌙  
like a quiet sky above ☁️  
even the smallest light ✨  
still finds a way to shine 🌸`,

`You are growing slowly 🌱  
even when you cannot see 🍃  
every step you’re taking  
is shaping who you’ll be 💜`,

`Some days feel heavy 🌧️  
like waves you cannot fight 🌊  
but storms don’t last forever  
they fade into the light 🌈`,

`Breathe in softly 🌿  
let your heart feel calm ☁️  
you don’t need perfection  
just be who you are 💫`
];

let i = 0;

function showQuote() {
    document.getElementById("quote").innerText = quotes[i];
    i = (i + 1) % quotes.length;
}

showQuote();
setInterval(showQuote, 10000);
</script>

</body>
</html>
